<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .bg { fill: #1A3A52; }
      .accent { fill: #7B9E89; }
      .highlight { fill: #D4A574; }
    </style>
  </defs>
  
  <!-- Background Circle -->
  <circle class="bg" cx="256" cy="256" r="256"/>
  
  <!-- Outer Ring Accent -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="#7B9E89" stroke-width="8" opacity="0.6"/>
  
  <!-- Center Heart-Hands Design (representing Health & Rights) -->
  <g transform="translate(256, 256)">
    <!-- Left Hand -->
    <path d="M -80 20 Q -95 10 -100 -5 Q -95 -15 -80 -10" 
          class="highlight" stroke="none"/>
    
    <!-- Right Hand -->
    <path d="M 80 20 Q 95 10 100 -5 Q 95 -15 80 -10" 
          class="highlight" stroke="none"/>
    
    <!-- Heart Symbol in Center -->
    <path d="M 0 -30 
             C -25 -50 -50 -45 -50 -20 
             C -50 0 -20 30 0 50 
             C 20 30 50 0 50 -20 
             C 50 -45 25 -50 0 -30 Z" 
          class="highlight" stroke="none"/>
    
    <!-- Inner Circle -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#D4A574" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Bottom Band (representing foundation/support) -->
  <rect x="50" y="380" width="412" height="80" class="accent" rx="10"/>
  <text x="256" y="435" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#1A3A52" text-anchor="middle" dominant-baseline="middle">HRI</text>
</svg>